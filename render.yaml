services:
  - type: web
    name: rullzye-store-web
    env: node
    region: singapore
    buildCommand: cd backend && npm install && cd ..
    startCommand: cd backend && node server.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DB_DIALECT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: rullzye-store-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@rullzyestore.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: rullzye-store-db
    plan: free
    region: singapore
    databaseName: rullzye_store
    ipAllowList: []
