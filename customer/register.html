<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Customer - Rullzye Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .auth-page { min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--deep-bg);position:relative;overflow:hidden }
        .auth-page::before { content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:500px;background:radial-gradient(circle at center,rgba(0,212,255,0.06) 0%,transparent 55%);pointer-events:none }
        .auth-card { position:relative;z-index:1;width:100%;max-width:480px;background:var(--glass-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.4) }
        .auth-logo { text-align:center;margin-bottom:28px }
        .auth-logo .brand-icon { width:48px;height:48px;background:linear-gradient(135deg,var(--cyan),var(--emerald));border-radius:14px;display:grid;place-items:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 12px;box-shadow:0 0 40px var(--cyan-glow) }
        .auth-logo h2 { font-size:22px;font-weight:800;letter-spacing:-0.03em }
        .auth-logo p { font-size:13px;color:var(--text-muted) }
        .auth-form .form-group { margin-bottom:16px }
        .auth-form .form-group label { display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px }
        .auth-form .form-control { width:100%;padding:12px 16px;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);color:var(--text-primary);font-family:inherit;font-size:14px;transition:var(--transition);outline:none }
        .auth-form .form-control:focus { border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-soft) }
        .auth-form .btn { width:100%;padding:12px;margin-top:8px }
        .auth-footer { text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted) }
        .auth-footer a { color:var(--cyan);font-weight:600 }
        .auth-back { position:absolute;top:24px;left:24px;color:var(--text-muted);font-size:14px;transition:var(--transition) }
        .auth-back:hover { color:var(--cyan) }
        .form-row { display:grid;grid-template-columns:1fr 1fr;gap:12px }
        @media(max-width:480px){ .form-row { grid-template-columns:1fr } }
    </style>
<link rel="icon" type="image/png" href="/favicon.png"></head>
<body>
    <div class="auth-page">
        <a href="../index.html" class="auth-back"><i class="fas fa-arrow-left"></i> Kembali</a>
        <div class="auth-card">
            <div class="auth-logo">
                <div class="brand-icon">R</div>
                <h2>Buat Akun Baru</h2>
                <p>Daftar untuk memesan dan memantau project website Anda</p>
            </div>

            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" class="form-control" placeholder="Nama Anda" required>
                    </div>
                    <div class="form-group">
                        <label>No. WhatsApp</label>
                        <input type="tel" class="form-control" placeholder="08XXXX" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="email@anda.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Min. 8 karakter" required>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" class="form-control" placeholder="Ulangi password" required>
                </div>
                <button type="submit" class="btn btn-primary">Daftar Sekarang</button>
            </form>

            <div class="auth-footer">
                Sudah punya akun? <a href="login.html">Masuk</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Pendaftaran berhasil! Silakan login.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
