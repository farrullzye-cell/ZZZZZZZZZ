<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pesanan Saya - Rullzye Store</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="../style.css"><style>.cust-body{background:var(--deep-bg);min-height:100vh;padding:24px;max-width:900px;margin:0 auto}.back-link{color:var(--text-muted);font-size:14px;transition:var(--transition);display:inline-flex;align-items:center;gap:6px;margin-bottom:20px}.back-link:hover{color:var(--cyan)}.order-card{background:var(--surface-1);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:var(--transition)}.order-card:hover{border-color:rgba(0,212,255,0.1)}.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.order-id{font-size:12px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}.order-status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--radius-pill)}.order-status.progress{background:var(--cyan-soft);color:var(--cyan)}.order-status.done{background:var(--emerald-soft);color:var(--emerald)}.order-name{font-size:16px;font-weight:700;letter-spacing:-0.03em;margin-bottom:4px}.order-meta{font-size:12px;color:var(--text-muted)}.order-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-subtle)}.order-price{font-size:16px;font-weight:700;color:var(--cyan)}.order-actions{display:flex;gap:8px}</style><link rel="icon" type="image/png" href="/favicon.png"></head><body>
<div class="cust-body">

    </div>

        </div>
    </div>
</div></body></html>
