<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Profil - Rullzye Store</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="../style.css"><style>.cust-body{background:var(--deep-bg);min-height:100vh;padding:24px;max-width:600px;margin:0 auto}.back-link{color:var(--text-muted);font-size:14px;transition:var(--transition);display:inline-flex;align-items:center;gap:6px;margin-bottom:20px}.back-link:hover{color:var(--cyan)}.profile-card{background:var(--surface-1);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:32px;text-align:center;margin-bottom:24px}.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--emerald));display:grid;place-items:center;font-size:32px;font-weight:800;color:#fff;margin:0 auto 16px;box-shadow:0 0 30px var(--cyan-glow)}.profile-name{font-size:20px;font-weight:800;letter-spacing:-0.03em}.profile-email{font-size:13px;color:var(--text-muted)}.profile-form{background:var(--surface-1);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:24px}.profile-form .form-group{margin-bottom:16px}.profile-form label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}.profile-form .form-control{width:100%;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);color:var(--text-primary);font-family:inherit;font-size:14px;outline:none;transition:var(--transition)}.profile-form .form-control:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-soft)}.btn-save{width:100%;margin-top:16px;padding:12px}</style><link rel="icon" type="image/png" href="/favicon.png"></head><body>
<div class="cust-body">
    <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali</a>
    <div class="profile-card">
        <div class="profile-avatar">A</div>
        <div class="profile-name">Andi Pratama</div>
        <div class="profile-email">andi.pratama@email.com</div>
    </div>
    <form class="profile-form" onsubmit="event.preventDefault();alert('Profil berhasil diperbarui!')">
        <div class="form-group"><label>Nama Lengkap</label><input type="text" class="form-control" value="Andi Pratama"></div>
        <div class="form-group"><label>Email</label><input type="email" class="form-control" value="andi.pratama@email.com"></div>
        <div class="form-group"><label>No. WhatsApp</label><input type="tel" class="form-control" value="08123456789"></div>
        <div class="form-group"><label>Password Baru</label><input type="password" class="form-control" placeholder="Biarkan kosong jika tidak diubah"></div>
        <button type="submit" class="btn btn-primary btn-save">Simpan Perubahan</button>
    </form>
</div></body></html>
